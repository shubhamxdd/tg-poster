<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineVault — Download Movies, Series & Anime</title>

    <!-- SEO -->
    <meta name="description" content="CineVault — Browse and download movies, series and anime in HD quality." />
    <meta name="theme-color" content="#0D0D0F" />

    <!-- Open Graph (WhatsApp, Telegram, Facebook previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CineVault — Download Movies, Series & Anime" />
    <meta property="og:description" content="Browse and download movies, series and anime in HD quality." />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter/X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CineVault — Download Movies, Series & Anime" />
    <meta name="twitter:description" content="Browse and download movies, series and anime in HD quality." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- display=swap: system font renders immediately; custom font swaps in once loaded -->
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />

    <!-- Critical CSS: dark background visible before any JS bundle loads -->
    <style>html,body,#root{background:#0D0D0F;color:#fff;margin:0;padding:0;font-family:system-ui,sans-serif}</style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
